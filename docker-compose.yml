services:
  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: sqlite:////data/gizmo.db
    volumes:
      - gizmo-data:/data
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ""
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  gizmo-data:
