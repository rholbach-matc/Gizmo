server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # nginx add_header directives do not inherit additively: if a location
    # defines any add_header, future server-level add_header directives must be
    # repeated in these locations or they will vanish from these responses.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri $uri/ /index.html;
    }

    location /bowls {
        proxy_pass http://backend:8000;
    }

    location /bm-entries {
        proxy_pass http://backend:8000;
    }

    location /dashboard {
        proxy_pass http://backend:8000;
    }

    location /episode-entries {
        proxy_pass http://backend:8000;
    }

    location /food-entries {
        proxy_pass http://backend:8000;
    }

    location /fluid-entries {
        proxy_pass http://backend:8000;
    }

    location /foods {
        proxy_pass http://backend:8000;
    }

    location /health {
        proxy_pass http://backend:8000;
    }

    location /medication-entries {
        proxy_pass http://backend:8000;
    }

    location /mood-entries {
        proxy_pass http://backend:8000;
    }

    location /vet-visit-entries {
        proxy_pass http://backend:8000;
    }

    location /vomit-entries {
        proxy_pass http://backend:8000;
    }

    location /weight-entries {
        proxy_pass http://backend:8000;
    }

    location /water-entries {
        proxy_pass http://backend:8000;
    }
}
